<mat-sidenav-container class="oh-shell">
  <mat-sidenav mode="side" [opened]="true" disableClose class="oh-shell__sidenav">
    <oh-sidenav />
  </mat-sidenav>

  <mat-sidenav-content class="oh-shell__content-wrap">
    <oh-header [pageTitle]="pageTitle" [pageSubtitle]="pageSubtitle" [hideTitle]="hideHeaderTitle" />

    <!-- TEMP: stand-in tabs row (with working routing) for /temp-project & /temp-profile -->
    <oh-temp-breadcrumb *ngIf="isTempRoute" />

    <!-- Sub-Header Breadcrumb and Screen Tabs Card -->
    <div class="oh-sub-header shadow-sm bg-white" *ngIf="pageTitle && !isTempRoute">

      <!-- Horizontal Tabs Row -->
      <div class="px-4 d-flex align-items-center gap-3 oh-sub-tabs" style="overflow-x: auto;">
        <ng-container *ngFor="let tab of activeModuleTabs; let isLast = last">
          <button 
            type="button"
            class="btn p-0 border-0 oh-sub-tab d-flex flex-column align-items-center position-relative text-uppercase"
            [class.oh-sub-tab--active]="isTabActive(tab)"
            (click)="navigateToTab(tab)"
          >
            <span class="oh-sub-tab-text">{{ tab.label }}</span>
            <span class="oh-sub-tab-arrow" *ngIf="isTabActive(tab)"></span>
          </button>
          <i *ngIf="!isLast" class="bi bi-chevron-right" style="font-size: 9px; color: var(--oh-gray-300); margin-top: -2px;"></i>
        </ng-container>
      </div>
    </div>

    <div class="oh-shell__content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
