<div class="oh-tab-content-atlas">
  <div class="row g-4">

    <!-- Left: Grouped Artifact Navigator -->
    <div class="col-md-3">
      <div class="oh-sub-category-list p-2 bg-white border rounded-3 shadow-sm">
        <div class="oh-sub-cat-group-label">Delivery</div>
        <button class="oh-sub-cat-btn d-flex align-items-center justify-content-between" [class.oh-sub-cat-btn--active]="activeSub() === 'requirements'" (click)="activeSub.set('requirements')">
          <span><i class="bi bi-file-earmark-ruled me-2"></i>Requirements Spec</span>
          <span class="oh-badge oh-badge--neutral text-xxs">{{ project.requirements.length }}</span>
        </button>
        <button class="oh-sub-cat-btn d-flex align-items-center justify-content-between" [class.oh-sub-cat-btn--active]="activeSub() === 'stories'" (click)="activeSub.set('stories')">
          <span><i class="bi bi-journal-bookmark me-2"></i>User Stories</span>
          <span class="oh-badge oh-badge--neutral text-xxs">{{ project.userStories.length }}</span>
        </button>
        <button class="oh-sub-cat-btn d-flex align-items-center justify-content-between" [class.oh-sub-cat-btn--active]="activeSub() === 'tasks'" (click)="activeSub.set('tasks')">
          <span><i class="bi bi-check2-square me-2"></i>Task Estimations</span>
          <span class="oh-badge oh-badge--neutral text-xxs">{{ project.tasks.length }}</span>
        </button>

        <div class="oh-sub-cat-group-label mt-2">Quality</div>
        <button class="oh-sub-cat-btn d-flex align-items-center justify-content-between" [class.oh-sub-cat-btn--active]="activeSub() === 'testCases'" (click)="activeSub.set('testCases')">
          <span><i class="bi bi-clipboard2-check me-2"></i>Test Cases</span>
          <span class="oh-badge oh-badge--neutral text-xxs">{{ project.testCases.length }}</span>
        </button>
        <button class="oh-sub-cat-btn d-flex align-items-center justify-content-between" [class.oh-sub-cat-btn--active]="activeSub() === 'bugs'" (click)="activeSub.set('bugs')">
          <span><i class="bi bi-bug me-2"></i>Bugs</span>
          <span class="oh-badge oh-badge--neutral text-xxs">{{ project.bugs.length }}</span>
        </button>
      </div>
    </div>

    <!-- Right: Atlas Content workspace -->
    <div class="col-md-9">
      <div class="oh-atlas-sub-container" *ngIf="activeSub() === 'requirements'">
        <oh-requirements-panel [project]="project"></oh-requirements-panel>
      </div>
      <div class="oh-atlas-sub-container" *ngIf="activeSub() === 'stories'">
        <oh-user-stories-panel [project]="project"></oh-user-stories-panel>
      </div>
      <div class="oh-atlas-sub-container" *ngIf="activeSub() === 'tasks'">
        <oh-tasks-panel [project]="project"></oh-tasks-panel>
      </div>
      <div class="oh-atlas-sub-container" *ngIf="activeSub() === 'testCases'">
        <oh-test-cases-panel [project]="project"></oh-test-cases-panel>
      </div>
      <div class="oh-atlas-sub-container" *ngIf="activeSub() === 'bugs'">
        <oh-bugs-panel [project]="project"></oh-bugs-panel>
      </div>
    </div>

  </div>
</div>
