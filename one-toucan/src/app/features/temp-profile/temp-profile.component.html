<!-- TEMP: sidebar + General Information panel layout. -->
<div class="oh-temp-profile-container pb-5">

  <div class="oh-toast-alert position-fixed bottom-0 end-0 m-4 p-3 rounded-lg shadow-lg d-flex align-items-center gap-3 text-white"
       *ngIf="alertMessage()"
       style="background-color: var(--oh-primary); z-index: 9999;">
    <i class="bi bi-check-circle-fill fs-5"></i>
    <span class="fw-semibold">{{ alertMessage() }}</span>
  </div>

  <div class="row g-4">

    <!-- Left: Avatar card + section nav -->
    <div class="col-12 col-md-4 col-lg-3">
      <mat-card appearance="outlined" class="oh-panel h-100">
        <mat-card-content class="p-4 d-flex flex-column align-items-center text-center">
          <div class="oh-temp-profile__avatar position-relative mb-3">
            <span class="oh-avatar rounded-circle d-flex align-items-center justify-content-center"
                  style="width: 88px; height: 88px; font-size: 28px; background-color: var(--oh-primary-soft); color: var(--oh-primary); font-weight: 700;">
              <ng-container *ngIf="!profileImage()">{{ initials() }}</ng-container>
              <img *ngIf="profileImage()" [src]="profileImage()" alt="" class="w-100 h-100 rounded-circle" style="object-fit: cover;" />
            </span>
            <label class="oh-temp-profile__avatar-upload" for="tempProfileAvatarInput" aria-label="Change photo">
              <i class="bi bi-camera-fill"></i>
            </label>
            <input id="tempProfileAvatarInput" type="file" accept="image/*" class="d-none" (change)="onAvatarSelected($event)" />
          </div>

          <h3 class="oh-heading-h3 mb-0">{{ fullName() }}</h3>
          <p class="oh-caption text-muted mb-2">{{ role() }}</p>
          <span class="oh-badge oh-badge--success mb-3">
            <i class="bi bi-dot"></i>{{ status() }}
          </span>

          <hr class="oh-temp-profile__divider my-2">

          <nav class="oh-temp-profile__nav w-100 text-start">
            <button type="button" class="oh-temp-profile__nav-item" [class.oh-temp-profile__nav-item--active]="activeTab() === 'general'" (click)="selectTab('general')">
              <i class="bi bi-person"></i>General Information
            </button>
            <button type="button" class="oh-temp-profile__nav-item" [class.oh-temp-profile__nav-item--active]="activeTab() === 'security'" (click)="selectTab('security')">
              <i class="bi bi-shield-lock"></i>Security & Password
            </button>
            <button type="button" class="oh-temp-profile__nav-item" [class.oh-temp-profile__nav-item--active]="activeTab() === 'notifications'" (click)="selectTab('notifications')">
              <i class="bi bi-bell"></i>Notifications
            </button>
          </nav>
        </mat-card-content>
      </mat-card>
    </div>

    <!-- Right: Content panel -->
    <div class="col-12 col-md-8 col-lg-9">
      <mat-card appearance="outlined" class="oh-panel">
        <mat-card-content class="p-4">

          <ng-container *ngIf="activeTab() === 'general'">
            <h3 class="oh-heading-h3 mb-1">General Information</h3>
            <p class="oh-caption text-muted mb-3">Update your basic profile details.</p>

            <hr class="oh-temp-profile__divider mb-4">

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <div class="oh-field">
                  <label class="oh-label" for="tempProfileFullName">Full Name *</label>
                  <input id="tempProfileFullName" class="oh-input" [(ngModel)]="form.fullName" name="fullName" required />
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="oh-field">
                  <label class="oh-label" for="tempProfileEmail">Email Address *</label>
                  <input id="tempProfileEmail" class="oh-input" type="email" [(ngModel)]="form.emailAddress" name="emailAddress" required />
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="oh-field">
                  <label class="oh-label" for="tempProfilePhone">Phone Number</label>
                  <input id="tempProfilePhone" class="oh-input" [(ngModel)]="form.phoneNumber" name="phoneNumber" />
                </div>
              </div>
              <div class="col-12 col-md-6">
                <div class="oh-field">
                  <label class="oh-label" for="tempProfileRole">Role</label>
                  <input id="tempProfileRole" class="oh-input" [value]="role()" disabled />
                </div>
              </div>
            </div>

            <hr class="oh-temp-profile__divider my-3">

            <div class="d-flex justify-content-end gap-2">
              <button mat-stroked-button (click)="cancel()">Cancel</button>
              <button mat-flat-button color="primary" (click)="save()">Save Changes</button>
            </div>
          </ng-container>

          <ng-container *ngIf="activeTab() === 'security'">
            <h3 class="oh-heading-h3 mb-1">Security & Password</h3>
            <p class="oh-caption text-muted mb-3">Coming soon.</p>
            <hr class="oh-temp-profile__divider mb-0">
          </ng-container>

          <ng-container *ngIf="activeTab() === 'notifications'">
            <h3 class="oh-heading-h3 mb-1">Notifications</h3>
            <p class="oh-caption text-muted mb-3">Coming soon.</p>
            <hr class="oh-temp-profile__divider mb-0">
          </ng-container>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
