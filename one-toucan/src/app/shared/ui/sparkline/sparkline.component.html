<svg
  [attr.viewBox]="'0 0 ' + viewWidth + ' ' + viewHeight"
  preserveAspectRatio="none"
  class="oh-sparkline"
  [class]="'oh-sparkline--' + color"
>
  <path [attr.d]="areaPath" class="oh-sparkline__area"></path>
  <path [attr.d]="linePath" class="oh-sparkline__line"></path>
  <circle [attr.cx]="lastPoint.x" [attr.cy]="lastPoint.y" r="3" class="oh-sparkline__dot"></circle>
</svg>
